import lit.formats
import os

config.test_source_root = os.path.dirname(__file__)
base_dir = os.path.dirname(os.path.dirname(config.test_source_root))

config.name = "ffcc"
config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {base_dir}"])
config.suffixes = [".ir", ".py"]

# forward nix compiler environment vars so that clang works
for var in ['NIX_LDFLAGS_FOR_TARGET', 'NIX_CFLAGS_COMPILE_FOR_TARGET', 'NIX_CFLAGS_COMPILE', 'NIX_LDFLAGS']:
    if var in os.environ:
        config.environment[var] = os.environ.get(var)
